name: Daily SupplyNote Sync

on:
  workflow_dispatch: # Allows manual trigger from cron-job.org or GitHub UI

jobs:
  sync_supplynote_data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright pandas psycopg2-binary
          playwright install chromium

      - name: Run Playwright Downloader (Yesterday Only)
        env:
          SUPPLYNOTE_USER: ${{ secrets.SUPPLYNOTE_USER }}
          SUPPLYNOTE_PASSWORD: ${{ secrets.SUPPLYNOTE_PASSWORD }}
        run: |
          # The script checks the .env file if it exists, but will fall back to environment variables.
          python scripts/fetch_all_ingredients_playwright.py --yesterday

      - name: Process and Upload to PostgreSQL
        env:
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASS: ${{ secrets.PG_PASS }}
          PG_DB: ${{ secrets.PG_DB }}
          PG_PORT: ${{ secrets.PG_PORT }}
        run: |
          python scripts/process_supplynote_dropzone.py
