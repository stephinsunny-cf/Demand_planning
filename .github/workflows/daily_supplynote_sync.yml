name: Daily SupplyNote Sync

on:
  workflow_dispatch: # Triggered by cron-job.org or manually from GitHub UI

jobs:
  sync_supplynote_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas psycopg2-binary requests python-dotenv
          playwright install chromium --with-deps

      - name: Download, Clean & Upload to PostgreSQL (In-Memory)
        env:
          SUPPLYNOTE_USER:     ${{ secrets.SUPPLYNOTE_USER }}
          SUPPLYNOTE_PASSWORD: ${{ secrets.SUPPLYNOTE_PASSWORD }}
          PG_HOST:             ${{ secrets.PG_HOST }}
          PG_USER:             ${{ secrets.PG_USER }}
          PG_PASS:             ${{ secrets.PG_PASS }}
          PG_DB:               ${{ secrets.PG_DB }}
          PG_PORT:             ${{ secrets.PG_PORT }}
        run: |
          python scripts/sync_supplynote_daily.py
